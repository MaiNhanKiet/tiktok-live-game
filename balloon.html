<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Balloon Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              pop: {
                "0%": { transform: "scale(0.55)", opacity: "0" },
                "100%": { transform: "scale(1)", opacity: "1" },
              },
              wobble: {
                "0%, 100%": { borderRadius: "40% 60% 70% 30% / 40% 50% 60% 50%" },
                "33%": { borderRadius: "70% 30% 50% 50% / 30% 30% 70% 70%" },
                "66%": { borderRadius: "100% 60% 60% 100% / 100% 100% 60% 60%" }
              },
              fall: {
                "0%": { transform: "translateY(-50px) scale(0)", opacity: "0" },
                "20%": { transform: "translateY(0px) scale(1)", opacity: "1" },
                "80%": { transform: "translateY(200px) scale(1)", opacity: "1" },
                "100%": { transform: "translateY(250px) scale(0)", opacity: "0" }
              }
            },
            animation: {
              pop: "pop 180ms ease-out",
              wobble: "wobble 8s ease-in-out infinite",
              fall: "fall 1s ease-in forwards"
            },
          },
        },
      };
    </script>
    <style>
      body {
        background: radial-gradient(circle at top, rgba(14, 165, 233, 0.22), transparent 30%),
                    radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.14), transparent 28%),
                    linear-gradient(180deg, #050816 0%, #090d22 100%);
        overflow: hidden;
      }

      .balloon {
        position: relative;
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(56, 189, 248, 0.9) 20%, rgba(2, 132, 199, 0.9) 60%, rgba(3, 105, 161, 1));
        box-shadow: 
          inset -10px -10px 20px rgba(0, 0, 0, 0.3),
          inset 10px 10px 20px rgba(255, 255, 255, 0.5),
          0 20px 40px rgba(0, 0, 0, 0.4);
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
      }
      
      .balloon:active {
        transform: scale(0.9) !important;
      }

      .balloon::after {
        content: "";
        position: absolute;
        top: 15%;
        left: 20%;
        width: 30%;
        height: 15%;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: rotate(-45deg);
        filter: blur(2px);
      }

      .water-drop {
        position: absolute;
        width: 15px;
        height: 20px;
        background: radial-gradient(circle at 30% 30%, #fff, #38bdf8);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        z-index: 10;
        pointer-events: none;
      }

      .water-stream {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 0px;
        background: linear-gradient(to bottom, rgba(56, 189, 248, 0.8), rgba(56, 189, 248, 0));
        transition: height 0.1s ease-out;
        border-radius: 20px;
        pointer-events: none;
        z-index: 5;
      }
      
      .splatter {
        position: absolute;
        font-size: 24px;
        font-weight: bold;
        color: white;
        text-shadow: 0px 0px 5px rgba(0,0,0,0.5);
        pointer-events: none;
        animation: flyUp 1s ease-out forwards;
      }

      @keyframes flyUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
      }
    </style>
  </head>

  <body class="min-h-screen text-white flex flex-col overflow-hidden">
    <!-- Nút trở về Menu -->
    <a href="menu.html" class="absolute top-4 left-4 z-50 rounded-full bg-slate-800/80 p-3 text-white shadow-lg hover:bg-slate-700 transition w-fit">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
    </a>

    <!-- Overlay Tặng Quà Ở Giữa Màn Hình -->
    <div id="giftAnnouncement" class="pointer-events-none fixed inset-0 z-50 flex items-start pt-[10vh] justify-center translate-y-10 opacity-0 transition-all duration-500">
        <div class="flex items-center gap-4 rounded-full bg-gradient-to-r from-fuchsia-600/90 to-purple-600/90 px-8 py-4 shadow-[0_0_40px_rgba(217,70,239,0.5)] backdrop-blur-md border border-white/20">
            <img id="announcementAvatar" src="https://via.placeholder.com/50" class="h-12 w-12 rounded-full border-2 border-white object-cover" />
            <div class="text-left">
                <div class="text-sm font-semibold text-fuchsia-200">Wow! Cảm ơn</div>
                <div class="text-xl font-black text-white" id="announcementText">User đã gửi 1 x Hoa hồng</div>
            </div>
            <img id="announcementIcon" src="" class="h-16 w-16 object-contain mix-blend-screen drop-shadow-2xl" />
        </div>
    </div>

    <!-- Header/Controls Area inside game directly -->
    <div class="absolute top-20 left-4 z-50 flex flex-col gap-4 w-72">
      <section class="rounded-3xl border border-white/10 bg-white/5 p-4 shadow-2xl backdrop-blur-xl">
        <h2 class="text-lg font-bold text-white mb-2 line-clamp-1">Water Balloon Game</h2>
        <div class="flex flex-col gap-2">
          <input
            id="usernameInput"
            type="text"
            readonly
            class="w-full rounded-xl border border-white/10 bg-slate-800/80 px-3 py-2 text-sm text-slate-300 outline-none cursor-not-allowed"
          />
          <button
            id="connectBtn"
            class="w-full rounded-xl bg-gradient-to-r from-sky-500 to-blue-500 px-3 py-2 text-sm font-bold text-white shadow-lg shadow-sky-500/20 transition hover:scale-[1.02] hover:opacity-95"
          >
            Kết nối
          </button>
          <div class="text-[10px] font-semibold uppercase tracking-widest text-slate-400 mt-1">Trạng thái</div>
          <div id="statusText" class="truncate text-sm font-bold text-red-400">Chưa kết nối</div>
        </div>
      </section>

      <section class="rounded-3xl border border-white/10 bg-white/5 p-4 shadow-2xl backdrop-blur-xl">
        <h2 class="text-sm font-bold text-white mb-2">Thống kê tương tác</h2>
        <div class="grid grid-cols-2 gap-2">
          <div class="rounded-xl border border-white/10 bg-slate-950/70 p-2 text-center">
            <div class="text-[10px] text-slate-400">Thể tích</div>
            <div id="volumeText" class="font-bold text-lg text-emerald-300">10%</div>
          </div>
          <div class="rounded-xl border border-white/10 bg-slate-950/70 p-2 text-center">
            <div class="text-[10px] text-slate-400">Likes / Chat</div>
            <div id="interactionCount" class="font-bold text-lg text-sky-300">0</div>
          </div>
          <div class="rounded-xl border border-white/10 bg-slate-950/70 p-2 text-center col-span-2">
            <div class="text-[10px] text-slate-400">Gifts</div>
            <div id="giftCount" class="font-bold text-lg text-fuchsia-300">0</div>
          </div>
        </div>
      </section>
    </div>

    <!-- Right Sidebar for Chat and Gifts -->
    <aside class="absolute top-4 right-4 z-50 flex flex-col gap-4 w-72 h-[calc(100vh-32px)] border border-white/10 bg-white/5 rounded-3xl p-4 overflow-hidden backdrop-blur-xl">
        <h3 class="text-lg font-bold bg-gradient-to-r from-sky-400 to-blue-400 bg-clip-text text-transparent border-b border-white/10 pb-2">Tương Tác Trực Tiếp</h3>
        <div id="chatBox" class="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-thin scrollbar-thumb-white/10"></div>
    </aside>

    <!-- Main Game Area -->
    <main class="flex-1 flex justify-center items-center relative overflow-hidden" id="gameArea">
      <!-- Water Hose/Pipe effect from top -->
      <div class="absolute top-0 w-16 h-8 bg-zinc-700 border-b-4 border-zinc-900 rounded-b-lg shadow-2xl z-20 flex justify-center">
        <div class="w-10 h-2 bg-zinc-900 absolute bottom-0 rounded-b-sm"></div>
      </div>
      <div id="waterStream" class="water-stream top-[30px]"></div>

      <!-- The Balloon -->
      <div id="balloon" class="balloon animate-wobble w-32 h-32 text-center flex-col shadow-2xl z-10" onclick="deflateBalloon()">
         <span class="text-white/80 font-black text-2xl drop-shadow-md select-none pointer-events-none" id="balloonLabel">CLICK!</span>
      </div>

      <div id="gameOverOverlay" class="absolute inset-0 hidden items-center justify-center bg-red-900/40 backdrop-blur-md z-[100]">
          <div class="rounded-3xl border border-white/10 bg-slate-950 p-8 text-center shadow-2xl shadow-black/80 max-w-sm w-full mx-4">
              <div class="text-5xl font-black text-red-500 mb-4 animate-bounce">💥 BÙM! 💥</div>
              <p class="text-xl text-white font-bold mb-6">Bóng đã nổ tung do bơm quá căng!</p>
              <button onclick="resetBalloon()" class="w-full rounded-2xl bg-gradient-to-r from-emerald-500 to-green-500 py-4 text-xl font-bold text-white shadow-xl hover:scale-[1.02] transition-transform">
                  Chơi Lại
              </button>
          </div>
      </div>
    </main>

    <script>
      // Auth Validation
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        window.location.href = 'auth.html';
      } else if (user.role !== 'admin' && (!user.allowedGames || !user.allowedGames.includes('balloon'))) {
        alert("🚫 Bạn chưa được cấp quyền chơi Bong Bóng Nước!");
        window.location.href = 'menu.html';
      }

      const API_BASE = "http://localhost:3000";
      const socket = io(API_BASE);

      socket.on('user_permissions_updated', (updatedUser) => {
          if (user && updatedUser.id === user.id) {
              localStorage.setItem('user', JSON.stringify(updatedUser));
              if (!updatedUser.isActive || (updatedUser.role !== 'admin' && (!updatedUser.allowedGames || !updatedUser.allowedGames.includes('balloon')))) {
                  alert("Quyền truy cập của bạn đã thay đổi, bạn sẽ được đưa về Menu!");
                  window.location.href = 'menu.html';
              }
          }
      });

      const els = {
        statusText: document.getElementById("statusText"),
        usernameInput: document.getElementById("usernameInput"),
        connectBtn: document.getElementById("connectBtn"),
        volumeText: document.getElementById("volumeText"),
        interactionCount: document.getElementById("interactionCount"),
        giftCount: document.getElementById("giftCount"),
        balloon: document.getElementById("balloon"),
        waterStream: document.getElementById("waterStream"),
        gameArea: document.getElementById("gameArea"),
        gameOverOverlay: document.getElementById("gameOverOverlay"),
        balloonLabel: document.getElementById("balloonLabel")
      };

      if (user) {
        els.usernameInput.value = user.tiktokId;
      }

      // Game state
      let stats = { interactions: 0, gifts: 0 };
      let balloonSize = 120; // initial px
      const MIN_SIZE = 100;
      let MAX_SIZE = Math.min(window.innerWidth, window.innerHeight) * 0.8;
      let streamTimeout;
      let isPopped = false;

      // Update Max Size on resize
      window.addEventListener('resize', () => {
         MAX_SIZE = Math.min(window.innerWidth, window.innerHeight) * 0.8;
      });

      function setStatus(text, colorClass) {
        els.statusText.textContent = text;
        els.statusText.className = `truncate text-sm font-bold mt-1 ${colorClass}`;
      }

      function updateStats() {
        els.interactionCount.textContent = stats.interactions;
        els.giftCount.textContent = stats.gifts;
        let percent = Math.min(100, Math.max(0, Math.round(((balloonSize - MIN_SIZE) / (MAX_SIZE - MIN_SIZE)) * 100)));
        els.volumeText.textContent = `${percent}%`;
        
        if (percent > 80 && !isPopped) {
            els.volumeText.classList.remove('text-emerald-300');
            els.volumeText.classList.add('text-red-500', 'animate-pulse');
        } else {
            els.volumeText.classList.remove('text-red-500', 'animate-pulse');
            els.volumeText.classList.add('text-emerald-300');
        }
      }

      function createWaterDrop(amount = 1) {
         if(isPopped) return;
         for(let i=0; i<Math.min(amount, 5); i++) {
             setTimeout(() => {
                 const drop = document.createElement("div");
                 drop.className = "water-drop animate-fall";
                 const leftOffset = 50 + (Math.random() * 4 - 2); // Slightly random horizontally
                 drop.style.left = `calc(${leftOffset}% + ${Math.random()*20-10}px)`;
                 els.gameArea.appendChild(drop);
                 setTimeout(() => drop.remove(), 1000);
             }, i * 100);
         }
      }

      function showWaterStream() {
         if(isPopped) return;
         // Calculate distance from top to balloon top
         const topDist = window.innerHeight / 2 - balloonSize / 2;
         els.waterStream.style.height = `${topDist - 30}px`; // reaches just above balloon
         
         clearTimeout(streamTimeout);
         streamTimeout = setTimeout(() => {
             els.waterStream.style.height = '0px';
         }, 300);
      }

      function spawnInteractionLog(type, data) {
        if(!data) return;
        const chatBox = document.getElementById("chatBox");
        if(!chatBox) return;

        const chatItem = document.createElement("div");
        chatItem.className = "text-sm animate-fade-in bg-white/5 rounded-lg p-2 flex gap-2 items-center border border-white/5";
        
        const username = data.username || "Fan";
        const avatar = data.profilePicture && data.profilePicture !== "https://via.placeholder.com/50" 
           ? `<img src="${data.profilePicture}" class="w-6 h-6 rounded-full object-cover">`
           : `<div class="w-6 h-6 rounded-full bg-slate-600 flex items-center justify-center text-[10px]">U</div>`;

        if (type === "like") {
            chatItem.innerHTML = `${avatar}<div class="flex-1"><span class="font-bold text-sky-400">${username}</span> <span class="text-slate-300 ml-1">đã gửi ${data.likeCount || 1} tim ❤️</span></div>`;
        } else if (type === "gift") {
            const giftName = data.giftName || "Quà tặng";
            const giftImg = data.giftPictureUrl ? `<img src="${data.giftPictureUrl}" class="h-5 inline" />` : "🎁";
            chatItem.innerHTML = `${avatar}<div class="flex-1"><span class="font-bold text-fuchsia-400">${username}</span> <span class="text-slate-300 ml-1">đã gửi ${data.amount || 1} ${giftName} ${giftImg}</span></div>`;
            
            // Show middle screen announcement
            const giftAnnouncement = document.getElementById("giftAnnouncement");
            const avatarEl = document.getElementById("announcementAvatar");
            const textEl = document.getElementById("announcementText");
            const iconEl = document.getElementById("announcementIcon");
            
            if (data.profilePicture) avatarEl.src = data.profilePicture;
            textEl.innerHTML = `<span class="text-fuchsia-400">${username}</span> gửi ${data.amount || 1} ${giftName}`;
            if (data.giftPictureUrl) {
                iconEl.src = data.giftPictureUrl;
                iconEl.classList.remove('hidden');
            } else {
                iconEl.classList.add('hidden');
            }

            // Animate announcement
            giftAnnouncement.classList.remove('opacity-0', 'translate-y-10');
            giftAnnouncement.classList.add('opacity-100', 'translate-y-0');
            
            // Hide after 3 seconds
            setTimeout(() => {
                giftAnnouncement.classList.remove('opacity-100', 'translate-y-0');
                giftAnnouncement.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        } else if (type === "comment") {
            chatItem.innerHTML = `${avatar}<div class="flex-1"><span class="font-bold text-slate-100">${username}:</span> <span class="text-slate-300 ml-1 break-words">${data.comment || ""}</span></div>`;
        }

        if (chatItem.innerHTML) {
            chatBox.appendChild(chatItem);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
      }

      function inflateBalloon(amount, type, data) {
        if(isPopped) return;
        
        if (type && data) {
           spawnInteractionLog(type, data);
        }
        
        balloonSize += amount;
        
        if (balloonSize >= MAX_SIZE) {
            popBalloon();
        } else {
            els.balloon.style.width = `${balloonSize}px`;
            els.balloon.style.height = `${balloonSize}px`;
        }
        updateStats();
      }

      function popBalloon() {
          isPopped = true;
          // Animate explosion
          els.balloon.style.transform = `scale(1.5)`;
          els.balloon.style.opacity = `0`;
          els.waterStream.style.height = '0px';
          
          setTimeout(() => {
              els.balloon.classList.add('hidden');
              els.gameOverOverlay.classList.remove('hidden');
              els.gameOverOverlay.classList.add('flex');
          }, 300);
      }

      function resetBalloon() {
          isPopped = false;
          balloonSize = 120;
          stats.interactions = 0;
          stats.gifts = 0;
          
          els.balloon.classList.remove('hidden');
          els.balloon.style.transform = `scale(1)`;
          els.balloon.style.opacity = `1`;
          els.balloon.style.width = `${balloonSize}px`;
          els.balloon.style.height = `${balloonSize}px`;
          
          els.gameOverOverlay.classList.remove('flex');
          els.gameOverOverlay.classList.add('hidden');
          updateStats();
      }

      window.deflateBalloon = function() {
          if (isPopped) return;
          // Shrink balloon by 1% of total dynamic range
          const onePercentPx = (MAX_SIZE - MIN_SIZE) * 0.01;
          balloonSize -= onePercentPx;
          if (balloonSize < MIN_SIZE) balloonSize = MIN_SIZE;
          els.balloon.style.width = `${balloonSize}px`;
          els.balloon.style.height = `${balloonSize}px`;
          updateStats();
          
          // spawn -1% click effect
          const sp = document.createElement("div");
          sp.className = "splatter";
          sp.innerText = "-1%";
          sp.style.left = `calc(50% + ${Math.random()*50-25}px)`;
          sp.style.top = `calc(50% + ${Math.random()*50-25}px)`;
          els.gameArea.appendChild(sp);
          setTimeout(() => sp.remove(), 1000);
      };

      async function startListening() {
        const username = els.usernameInput.value.trim();
        if (!username) {
          alert("Vui lòng nhập ID!");
          return;
        }
        setStatus(`Đang kết nối @${username}`, "text-amber-300");
        els.connectBtn.disabled = true;
        els.connectBtn.classList.add('opacity-50', 'cursor-not-allowed');

        try {
          const response = await fetch(`${API_BASE}/api/start-session`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tiktokUsername: username }),
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result?.error || "Không thể kết nối");
          setStatus(`Đã kết nối @${result?.data?.connectedId || username}`, "text-emerald-300");
        } catch (error) {
          setStatus("Kết nối thất bại", "text-red-400");
          alert(error.message || "Không thể kết nối tới server");
        } finally {
            els.connectBtn.disabled = false;
            els.connectBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
      }

      els.connectBtn.addEventListener("click", startListening);

      window.addEventListener("beforeunload", () => {
        if (els.statusText.textContent.includes("Đã kết nối")) {
          navigator.sendBeacon(`${API_BASE}/api/stop-session`);
        }
      });

      // Socket Listeners
      socket.on("connect", () => {
        if (!els.statusText.textContent.includes("Đã kết nối")) {
            setStatus("Đã sẵn sàng", "text-amber-400");
        }
      });

      socket.on("tiktok-like", (data) => {
        const count = Math.max(1, Number(data?.amount || data?.likeCount || 1));
        stats.interactions += count;
        
        const onePercentPx = (MAX_SIZE - MIN_SIZE) * 0.01;
        // Like >= 20 gives +1%
        const boost = count >= 20 ? onePercentPx : 0;
        
        inflateBalloon(boost, "like", data);
        if (boost > 0) createWaterDrop(1);
      });

      socket.on("tiktok-chat", (data) => {
        stats.interactions += 1;
        const onePercentPx = (MAX_SIZE - MIN_SIZE) * 0.01;
        inflateBalloon(onePercentPx, "comment", data); // +1% per chat
        createWaterDrop(1);
        showWaterStream();
      });

      socket.on("tiktok-gift", (data) => {
        const count = Math.max(1, Number(data?.amount || 1));
        const dia = Math.max(1, Number(data?.diamondCount || data?.diamonds || 1));
        stats.gifts += count; // Store total raw gifts received
        
        const totalCoins = count * dia;
        const onePercentPx = (MAX_SIZE - MIN_SIZE) * 0.01;
        const boost = Math.max(0, totalCoins * onePercentPx); // 1 xu = +1%
        
        inflateBalloon(boost, "gift", data);
        createWaterDrop(Math.min(totalCoins, 20));
        showWaterStream();
      });

      socket.on("tiktok-disconnected", () => {
        setStatus("Mất kết nối TikTok", "text-red-400");
      });
      socket.on("disconnect", () => {
        setStatus("Mất kết nối socket", "text-red-400");
      });

    </script>
  </body>
</html>
